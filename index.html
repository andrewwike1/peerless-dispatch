<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Peerless Restoration — Dispatch Board</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f0f2f5;color:#222}
.hdr{position:sticky;top:0;z-index:99;background:#1a1a2e;color:#fff;padding:12px 20px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.hdr-title{font-size:1.2rem;font-weight:700}
.hdr-sub{font-size:.76rem;color:#aaa;margin-top:2px}
.hdr-time{font-size:.78rem;color:#ccc;text-align:right;line-height:1.5}
.board{padding:16px;max-width:1400px;margin:0 auto}
.sec{margin-bottom:26px}
.sec-hdr{display:flex;align-items:center;gap:10px;padding:10px 16px;border-radius:8px 8px 0 0;font-weight:700;font-size:.92rem;color:#fff}
.cnt{background:rgba(255,255,255,.25);border-radius:12px;padding:2px 9px;font-size:.73rem;font-weight:600}
.sec-urgent .sec-hdr{background:#b71c1c}
.sec-62711 .sec-hdr{background:#1565c0}
.sec-62704 .sec-hdr{background:#2e7d32}
.sec-62677 .sec-hdr{background:#e65100}
.sec-other .sec-hdr{background:#6a1b9a}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(305px,1fr));gap:11px;padding:12px;background:rgba(0,0,0,.04);border-radius:0 0 8px 8px}
.card{background:#fff;border-radius:8px;padding:13px;box-shadow:0 1px 4px rgba(0,0,0,.1);border-left:4px solid #ccc}
.card.cu{border-left-color:#b71c1c}
.card.cr{border-left-color:#e65100}
.card.cc{border-left-color:#9e9e9e;opacity:.72}
.card.cn{border-left-color:#388e3c}
.ctop{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:7px;gap:8px}
.cname{font-weight:700;font-size:.95rem;color:#1a1a2e}
.cphone{font-size:.74rem;color:#777;margin-top:2px}
.badge{font-size:.65rem;font-weight:700;padding:3px 7px;border-radius:10px;white-space:nowrap;text-transform:uppercase;letter-spacing:.4px;flex-shrink:0;margin-top:2px}
.bu{background:#b71c1c;color:#fff}
.br{background:#e65100;color:#fff}
.bn{background:#388e3c;color:#fff}
.bc{background:#9e9e9e;color:#fff}
.det{font-size:.78rem;color:#555;margin-bottom:3px;display:flex;gap:5px;line-height:1.4}
.lbl{color:#aaa;min-width:56px;flex-shrink:0;font-size:.74rem}
.desc{font-size:.78rem;color:#555;background:#f8f9fa;border-radius:4px;padding:6px 8px;margin:7px 0;border-left:3px solid #dee2e6;line-height:1.45}
.ctime{font-size:.71rem;color:#bbb;margin-top:5px}
.sel-row{margin-top:8px}
select.sts{width:100%;padding:5px 8px;border:1px solid #ddd;border-radius:6px;font-size:.78rem;color:#333;cursor:pointer;transition:background .15s}
select.sts:focus{outline:none;border-color:#1565c0;box-shadow:0 0 0 2px rgba(21,101,192,.2)}
.footer{text-align:center;color:#bbb;font-size:.7rem;padding:24px 16px}
@media(max-width:540px){.hdr{flex-direction:column;align-items:flex-start;gap:4px}.hdr-time{font-size:.72rem}}
</style>
</head>
<body>

<div class="hdr">

    <div class="hdr-title">Peerless Restoration</div>

  </div>
  <div class="hdr-time" id="ts"></div>
</div>

<div class="board" id="board"></div>
<div class="footer" id="footer"></div>

  {id:1, name:"Mike Duke",        phone:"2178166835", addr:"4008 Surry Place Lane, Springfield 62711",           zip:"62711", type:"Water Damage", owner:"Yes", desc:"Called Thu, Fri, Sat, and Mon requesting service. Was told not receiving service on Fri; no contact since. Multiple escalating callbacks wanting status.", rcvd:"Jun 14 @ 8:47 AM", calls:3, def:"New"},

  {id:7, name:"Whitney Kim",      phone:"2174946157", addr:"35 Providence Lane, Springfield 62711",             zip:"62711", type:"Water Damage", owner:"Yes", desc:"Was told service would be provided; has not received it and wants an ETA. Later called to CANCEL.", rcvd:"Jun 13 @ 7:50 AM", calls:2, def:"Cancelled"},
  {id:8, name:"Kelly Hurst",      phone:"2173417483", addr:"4661 Barrington Dr, Springfield 62711",             zip:"62711", type:"Water Damage", owner:"Yes", desc:"Requesting water damage assistance.", rcvd:"Jun 15 @ 6:56 AM", calls:1, def:"New"},
  {id:9, name:"Billie Berghold",  phone:"2174141965", addr:"2309 Knoxville Ave, Springfield 62711",             zip:"62711", type:"Water Damage", owner:"Yes", desc:"Basement water damage. Had issues with Serve Pro and is looking for an alternative provider.", rcvd:"Jun 15 @ 12:21 AM", calls:1, def:"New"},

  {id:11,name:"Neil Polomas",     phone:"2177252145", addr:"2400 Asheville Drive, Springfield 62711",           zip:"62711", type:"Water Damage", owner:"Yes", desc:"Backup in basement; needs water extraction.", rcvd:"Jun 13 @ 8:06 PM", calls:1, def:"New"},
  {id:12,name:"Kurt Davis",       phone:"3143412378", addr:"5308 Jaeger Drive, Springfield 62711",              zip:"62711", type:"Water Damage", owner:"Yes", desc:"Water backup into basement during power outage.", rcvd:"Jun 13 @ 4:58 PM", calls:1, def:"New"},
  {id:13,name:"Dave Chapman",     phone:"2178360211", addr:"4004 Old Mill Lane, Springfield 62711",             zip:"62711", type:"Water Damage", owner:"Yes", desc:"Asking about disinfectant treatment for standing water and wet drywall.", rcvd:"Jun 13 @ 4:49 PM", calls:1, def:"New"},
  {id:14,name:"Jodi Grant",       phone:"2177253922", addr:"2109 Burgess Drive, Springfield 62711",             zip:"62711", type:"Water Damage", owner:"Yes", desc:"Basement flooded; drywall is wet.", rcvd:"Jun 13 @ 4:19 PM", calls:1, def:"New"},
  {id:15,name:"Rick Soehnlin",    phone:"2178010673", addr:"210 Gray Court, Springfield 62711",                 zip:"62711", type:"Water Damage", owner:"Yes", desc:"Basement water damage; sump pump failed during power outage.", rcvd:"Jun 13 @ 3:58 PM", calls:1, def:"New"},
  {id:16,name:"Danielle Alstott", phone:"2176711900", addr:"2808 Whiteside Place, Springfield 62711",           zip:"62711", type:"Water Damage", owner:"Yes", desc:"Asking when work can start if she accepts the quote.", rcvd:"Jun 13 @ 3:19 PM", calls:1, def:"New"},
  {id:17,name:"Anna Matula",      phone:"2177415820", addr:"Turnstone Road, Springfield 62711",                 zip:"62711", type:"Water Damage", owner:"Yes", desc:"Workers were supposed to be on property today; calling for a status update.", rcvd:"Jun 13 @ 2:03 PM", calls:1, def:"New"},
  {id:18,name:"Jane Rouland",     phone:"2174156114", addr:"3303 Lakemere Drive, Springfield 62711",            zip:"62711", type:"Water Damage", owner:"Yes", desc:"New home; sump pump pipe shifted, carpet and insulation are wet.", rcvd:"Jun 13 @ 11:45 AM", calls:1, def:"New"},
  {id:19,name:"Tom Sestak",       phone:"2178168846", addr:"2305 Gander Road, Springfield 62711",               zip:"62711", type:"Water Damage", owner:"Yes", desc:"Requesting to update contact number; confirming appointment for June 13.", rcvd:"Jun 13 @ 11:09 AM", calls:1, def:"New"},
  {id:20,name:"Leslie Frederick", phone:"2178364810", addr:"2808 Covered Wagon Trail, Springfield 62711",       zip:"62711", type:"Water Damage", owner:"Yes", desc:"Basement water — sump pump intact but needs immediate extraction ASAP.", rcvd:"Jun 13 @ 10:05 AM", calls:1, def:"New"},
  {id:21,name:"Kalpana Desai",    phone:"2178990830", addr:"212 Astoria Road, Springfield 62704",               zip:"62704", type:"Water Damage", owner:"Yes", desc:"Called Friday; no callback received. Smell upstairs. Insurance claim #7010298024.", rcvd:"Jun 15 @ 6:11 AM", calls:1, def:"New"},
  {id:22,name:"Patrick Quigley", phone:"2174140414", addr:"2305 Amber Court, Springfield 62704",                zip:"62704", type:"Water Damage", owner:"Yes", desc:"Needs someone to contact him today — described as urgent.", rcvd:"Jun 13 @ 5:38 PM", calls:1, def:"New"},
  {id:23,name:"Jon Launer",       phone:"8085428476", addr:"112 Norwalk Road, Springfield 62704",               zip:"62704", type:"Water Damage", owner:"Yes", desc:"Property flooded by recent storm.", rcvd:"Jun 13 @ 5:28 PM", calls:1, def:"New"},
  {id:24,name:"Megan Forness",    phone:"2177203433", addr:"119 Calvin Avenue, Springfield 62704",              zip:"62704", type:"Water Damage", owner:"Yes", desc:"Power outage caused battery backup failure; 3 inches of water in basement. Carpet and mold concern.", rcvd:"Jun 13 @ 3:28 PM", calls:1, def:"New"},
  {id:25,name:"Jennifer Notariano",phone:"9855070166",addr:"1604 South Lowell Avenue, Springfield 62704",       zip:"62704", type:"Water Damage", owner:"Yes", desc:"Receding water in basement; wants blowout/restoration services.", rcvd:"Jun 13 @ 12:00 PM", calls:1, def:"New"},
  {id:26,name:"Lisa Belz",        phone:"2174156454", addr:"3125 La Conner Drive, Springfield 62704",           zip:"62704", type:"Water Damage", owner:"No",  desc:"Calling on behalf of son with water damage. Situation described as urgent.", rcvd:"Jun 13 @ 9:26 AM", calls:1, def:"New"},
  {id:27,name:"Courtney Putman",  phone:"2174147190", addr:"12220 Salisbury Road, Pleasant Plains 62677",       zip:"62677", type:"Water Damage", owner:"Yes", desc:"Water in garage.", rcvd:"Jun 14 @ 9:07 AM", calls:1, def:"New"},
  {id:28,name:"Bryan West",       phone:"2176150383", addr:"260 Larkspur Drive, Decatur 62522",                 zip:"other", type:"Water Damage", owner:"Yes", desc:"Carpet wet near sump pump.", rcvd:"Jun 18 @ 5:13 PM", calls:1, def:"New"},
  {id:29,name:"Matt Brown",       phone:"2175193492", addr:"421 Woodside Trail Unit E2/E1, Decatur 62521",      zip:"other", type:"Water Damage", owner:"No",  desc:"Woodland Condo water infiltration.", rcvd:"Jun 17 @ 7:39 PM", calls:1, def:"New"},
  {id:30,name:"Scott Dowell",     phone:"2175207624", addr:"1517 South 44th Street, Decatur 62521",             zip:"other", type:"Water Damage", owner:"Yes", desc:"Crawl space water damage.", rcvd:"Jun 17 @ 7:31 PM", calls:1, def:"New"},
  {id:31,name:"Cindy Jenkins",    phone:"2178556774", addr:"1020 Veech Lane, Decatur 62521",                    zip:"other", type:"Water Damage", owner:"Yes", desc:"URGENT: sewage backing out of shower; basement is flooding.", rcvd:"Jun 17 @ 7:01 PM", calls:1, def:"New"},
  {id:32,name:"Rebecca Worthin",  phone:"2175215380", addr:"2560 South Long Creek Road, Decatur 62521",         zip:"other", type:"Water Damage", owner:"Yes", desc:"Water coming out of basement.", rcvd:"Jun 17 @ 6:30 PM", calls:1, def:"New"},
  {id:33,name:"Hannah Hissong",   phone:"2603121203", addr:"3926 East Park Lane, Decatur 62521",                zip:"other", type:"Water Damage", owner:"Yes", desc:"Water in garage and lower level.", rcvd:"Jun 17 @ 6:19 PM", calls:1, def:"New"},
  {id:34,name:"West Reese",       phone:"7143853849", addr:"Timber Ridge Drive, Springfield",                   zip:"other", type:"Water Damage", owner:"—",   desc:"Requesting inspection photos from previous job.", rcvd:"Jun 15 @ 5:29 PM", calls:1, def:"New"},
  {id:35,name:"John Richardson",  phone:"2175535184", addr:"Springfield",                                       zip:"other", type:"Other",        owner:"—",   desc:"Had a scheduled appointment to have basement dried; no crew arrived.", rcvd:"Jun 13 @ 1:51 PM", calls:1, def:"New"},
  {id:36,name:"Jim Highfill Jr",  phone:"2174152981", addr:"Springfield",                                       zip:"other", type:"Other",        owner:"—",   desc:"Workers currently onsite; cabinets need to be moved.", rcvd:"Jun 14 @ 8:39 AM", calls:1, def:"New"},
  {id:37,name:"Rosemary Leistner",phone:"2177413028", addr:"Springfield",                                       zip:"other", type:"Other",        owner:"—",   desc:"Calling to confirm someone will be onsite Monday at 8am.", rcvd:"Jun 14 @ 12:44 PM", calls:1, def:"New"},
  {id:38,name:"Rochelle Sales",   phone:"2175217772", addr:"Decatur",                                           zip:"other", type:"Other",        owner:"—",   desc:"Requesting an estimate for cleaning 3 rooms.", rcvd:"Jun 13 @ 4:08 PM", calls:1, def:"New"},
  {id:39,name:"Cathy Sladge",     phone:"6183151959", addr:"Mount Vernon",                                      zip:"other", type:"Other",        owner:"—",   desc:"Checking her position on list for basement water removal.", rcvd:"Jun 13 @ 2:26 PM", calls:1, def:"New"},
  {id:40,name:"Lizy",             phone:"9102614215", addr:"Fayetteville",                                      zip:"other", type:"Other",        owner:"—",   desc:"Carpet cleaning inquiry.", rcvd:"Jun 16 @ 5:14 PM", calls:1, def:"New"},
  {id:41,name:"Lynn Renner",      phone:"2172544784", addr:"Mattoon",                                           zip:"other", type:"Other",        owner:"—",   desc:"Called to cancel a service request.", rcvd:"Jun 16 @ 8:34 PM", calls:1, def:"Cancelled"},
];

const OPTS = ["New","Called-No Answer","Contacted","Scheduled","Crew Dispatched","In Progress","Complete","Cancelled"];
const SBG = {"New":"#e8f5e9","Called-No Answer":"#fff3e0","Contacted":"#e3f2fd","Scheduled":"#f3e5f5","Crew Dispatched":"#e0f2f1","In Progress":"#fffde7","Complete":"#c8e6c9","Cancelled":"#f5f5f5"};

function gs(phone){ return localStorage.getItem('pr_'+phone) || null; }
function ss(phone,v){ localStorage.setItem('pr_'+phone,v); }

function fmtPhone(p){
  if(p.length===10) return '('+p.slice(0,3)+') '+p.slice(3,6)+'-'+p.slice(6);
  return p;
}

function cardCls(j){
  if(j.calls>=3) return 'cu';
  if(j.def==='Cancelled') return 'cc';
  if(j.calls>1) return 'cr';
  return 'cn';
}
function badgeCls(j){
  if(j.calls>=3) return 'bu';
  if(j.def==='Cancelled') return 'bc';
  if(j.calls>1) return 'br';
  return 'bn';
}
function badgeTxt(j){
  if(j.calls>=3) return 'URGENT &mdash; '+j.calls+' calls';
  if(j.def==='Cancelled') return 'CANCELLED';
  if(j.calls>1) return 'REPEAT &mdash; '+j.calls+' calls';
  return 'NEW';
}

function renderCard(j){
  var status = gs(j.phone) || j.def;
  var bg = SBG[status]||'#fff';
  var opts = OPTS.map(function(o){ return '<option'+(o===status?' selected':'')+'>'+o+'</option>'; }).join('');
  return '<div class="card '+cardCls(j)+'" id="c'+j.id+'">'
    +'<div class="ctop"><div><div class="cname">'+j.name+'</div><div class="cphone">'+fmtPhone(j.phone)+'</div></div>'
    +'<span class="badge '+badgeCls(j)+'">'+badgeTxt(j)+'</span></div>'
    +'<div class="det"><span class="lbl">Address</span>'+j.addr+'</div>'
    +'<div class="det"><span class="lbl">Type</span>'+j.type+'</div>'
    +'<div class="det"><span class="lbl">Owner</span>'+j.owner+'</div>'
    +'<div class="desc">'+j.desc+'</div>'
    +'<div class="ctime">Received: '+j.rcvd+'</div>'
    +'<div class="sel-row"><select class="sts" data-phone="'+j.phone+'" style="background:'+bg+'" onchange="upd(this)">'+opts+'</select></div>'
    +'</div>';
}

function upd(sel){
  ss(sel.dataset.phone, sel.value);
  sel.style.background = SBG[sel.value]||'#fff';
}

function sortFn(a,b){
  var ac = a.def==='Cancelled'?1:0, bc = b.def==='Cancelled'?1:0;
  if(ac!==bc) return ac-bc;
  return b.calls-a.calls;
}

function renderSec(title, cls, jobs){
  if(!jobs.length) return '';
  return '<div class="sec '+cls+'"><div class="sec-hdr">'+title+' <span class="cnt">'+jobs.length+'</span></div>'
    +'<div class="grid">'+jobs.map(renderCard).join('')+'</div></div>';
}

var urgent = JOBS.filter(function(j){return j.calls>=3;});
var z11    = JOBS.filter(function(j){return j.zip==='62711';}).sort(sortFn);
var z04    = JOBS.filter(function(j){return j.zip==='62704';}).sort(sortFn);
var z77    = JOBS.filter(function(j){return j.zip==='62677';}).sort(sortFn);
var zOth   = JOBS.filter(function(j){return j.zip==='other';}).sort(sortFn);

document.getElementById('board').innerHTML = [
  renderSec('!! URGENT — Multiple Callbacks Required', 'sec-urgent', urgent),
  renderSec('ZIP 62711 — Springfield', 'sec-62711', z11),
  renderSec('ZIP 62704 — Springfield / Jerome', 'sec-62704', z04),
  renderSec('ZIP 62677 — Pleasant Plains', 'sec-62677', z77),
  renderSec('Other Areas', 'sec-other', zOth),
].join('');

var now = new Date();
var disp = now.toLocaleString('en-US',{timeZone:'America/Chicago',month:'short',day:'numeric',year:'numeric',hour:'numeric',minute:'2-digit',hour12:true});
document.getElementById('ts').innerHTML = 'Updated<br>'+disp+' CT';
document.getElementById('footer').innerHTML = 'Peerless Restoration Dispatch Board &mdash; auto-generated '+now.toISOString().slice(0,16).replace('T',' ')+' UTC &mdash; '+JOBS.length+' total calls';
</script>
</body>
</html>
